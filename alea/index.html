<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dobbelspel</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <main class="app">
    <a href="../index.html" class="back-link">← Terug naar home</a>

    <header class="topbar">
      <h1>Dobbelspel</h1>
      <p class="subtitle">Klik op de dobbelstenen bovenaan en gooi 5 dobbelstenen door de toren.
        Bedenk zelf een leuk spel of probeer zo dicht bij 21 te gooien, maar niet hoger.
      </p>

    </header>

    <section class="game-shell">
      <aside class="info-panel">
        <div class="status-card">
          <span class="label">Laatste worp</span>
          <div id="resultSummary" class="value">Nog niet gegooid</div>
        </div>

        <div class="status-card small">
          <span class="label">Totaal</span>
          <div id="totalValue" class="big-total">0</div>
        </div>

        <button id="rollBtn" class="action-btn">Gooi dobbelstenen</button>
        <button id="resetBtn" class="action-btn secondary">Reset</button>

        <p class="help-text">
          Klik op de dobbelstenen bovenaan of op de knop om een nieuwe worp te doen.
        </p>
      </aside>

      <section class="board-panel">
        <div id="tableScene" class="table-scene" aria-label="Dobbeltafel">
          <img id="tableImage" class="table-image" src="table.png" alt="Dobbeltafel" />

          <div class="top-dice-area">
            <button id="dieTrigger" class="dice-strip-trigger" type="button" aria-label="Gooi dobbelstenen">
                <div class="top-dice-strip">
                <model-viewer
                    class="top-spin-die"
                    src="dice.glb"
                    autoplay
                    auto-rotate
                    auto-rotate-speed="140deg"
                    rotation-per-second="140deg"
                    interaction-prompt="none"
                    disable-zoom
                    disable-pan
                    disable-tap>
                </model-viewer>

                <model-viewer
                    class="top-spin-die"
                    src="dice.glb"
                    autoplay
                    auto-rotate
                    auto-rotate-speed="140deg"
                    rotation-per-second="140deg"
                    interaction-prompt="none"
                    disable-zoom
                    disable-pan
                    disable-tap>
                </model-viewer>

                <model-viewer
                    class="top-spin-die"
                    src="dice.glb"
                    autoplay
                    auto-rotate
                    auto-rotate-speed="140deg"
                    rotation-per-second="140deg"
                    interaction-prompt="none"
                    disable-zoom
                    disable-pan
                    disable-tap>
                </model-viewer>

                <model-viewer
                    class="top-spin-die"
                    src="dice.glb"
                    autoplay
                    auto-rotate
                    auto-rotate-speed="140deg"
                    rotation-per-second="140deg"
                    interaction-prompt="none"
                    disable-zoom
                    disable-pan
                    disable-tap>
                </model-viewer>

                <model-viewer
                    class="top-spin-die"
                    src="dice.glb"
                    autoplay
                    auto-rotate
                    auto-rotate-speed="140deg"
                    rotation-per-second="140deg"
                    interaction-prompt="none"
                    disable-zoom
                    disable-pan
                    disable-tap>
                </model-viewer>
                </div>
            </button>
          </div>

          <div id="towerWrap" class="tower-wrap">
            <img id="towerImage" class="tower-image" src="tower.png" alt="Dobbeltoren" />
          </div>

          <div id="diceTray" class="dice-tray" aria-live="polite">
            <div class="die-slot" data-slot="0">
              <img class="result-die" src="dice1.png" alt="Dobbelsteen 1" />
            </div>
            <div class="die-slot" data-slot="1">
              <img class="result-die" src="dice2.png" alt="Dobbelsteen 2" />
            </div>
            <div class="die-slot" data-slot="2">
              <img class="result-die" src="dice3.png" alt="Dobbelsteen 3" />
            </div>
            <div class="die-slot" data-slot="3">
              <img class="result-die" src="dice4.png" alt="Dobbelsteen 4" />
            </div>
            <div class="die-slot" data-slot="4">
              <img class="result-die" src="dice5.png" alt="Dobbelsteen 5" />
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
